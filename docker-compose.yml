version: '3.8'

# Docker Compose configuration for git-debug-oracle
# Starts MCP server and Qdrant vector database together

services:
  # MCP Server for git-debug-oracle
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: git-debug-oracle-mcp
    image: git-debug-oracle:latest
    ports:
      - "${WEBHOOK_PORT:-8000}:8000"
    environment:
      # Qdrant configuration
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: git_debug_oracle
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # API Keys (required at runtime)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Configuration
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-code-2}
      REPO_PATH: ${REPO_PATH:-}
      WATCH_BRANCH: ${WATCH_BRANCH:-main}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8000}

      # Chunking configuration
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}

      # Retrieval configuration
      TOP_K: ${TOP_K:-5}
      RECENT_COMMIT_WINDOW: ${RECENT_COMMIT_WINDOW:-30}
      MAX_CONTEXT_CHUNKS: ${MAX_CONTEXT_CHUNKS:-10}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}

      # Python
      PYTHONUNBUFFERED: "1"

    depends_on:
      qdrant:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    networks:
      - git-debug-oracle

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: git-debug-oracle-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

    volumes:
      # Named volume for persistent storage
      - qdrant_storage:/qdrant/storage
      # Optional: Custom Qdrant configuration
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    networks:
      - git-debug-oracle

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Shared network for service communication
networks:
  git-debug-oracle:
    driver: bridge

# Named volume for Qdrant persistence
volumes:
  qdrant_storage:
    driver: local
