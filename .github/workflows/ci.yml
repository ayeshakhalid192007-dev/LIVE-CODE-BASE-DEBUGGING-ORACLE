name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run ruff
        run: uv run ruff check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run mypy
        run: uv run mypy src/ --strict

  test:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=git_debug_oracle --cov-report=term-missing

      - name: Check coverage threshold
        run: |
          coverage_output=$(uv run pytest tests/ --cov=git_debug_oracle --cov-report=term | grep -oP '\d+%' | tail -1 | tr -d '%')
          if [ "$coverage_output" -lt 80 ]; then
            echo "Coverage ${coverage_output}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage ${coverage_output}% meets threshold"

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: git-debug-oracle:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
